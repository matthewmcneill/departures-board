; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
board_build.partitions = custom_partitions.csv
extra_scripts = pre:scripts/generate_headers.py, pre:scripts/build_fonts.py
build_flags =
	-D VERSION_MAJOR=3
	-D VERSION_MINOR=2
	-D WEBAPPVER_MAJOR=3
	-D WEBAPPVER_MINOR=3
	-D CORE_DEBUG_LEVEL=0
	-D GITHUBAPIHOST='"api.github.com"'
	-D GITHUBTOKEN='""'
	-D GITHUBREPOPATH='"/repos/gadec-uk/departures-board/releases/latest"'
	-D U8G2_WITHOUT_FONT_ROTATION
	-D U8G2_WITHOUT_UNICODE
	-D APP_DEBUG_LEVEL=4
board_build.f_cpu = 240000000L
framework = arduino
monitor_speed = 115200
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps =
	tzapu/WiFiManager@2.0.17
	olikraus/U8g2@2.36.5
	bblanchon/ArduinoJson@7.2.2
  	ESP32Async/AsyncTCP@3.4.10
  	ESP32Async/ESPAsyncWebServer@3.10.0