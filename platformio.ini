; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = esp32dev, esp32s3nano

[custom]
github_ota_repo = matthewmcneill/departures-board

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
board_build.partitions = partitions.esp32dev.csv
extra_scripts = 
	pre:scripts/build_timestamp.py
	pre:scripts/build_fonts.py
	pre:scripts/auto_build_wasm.py
	pre:scripts/run_web_tests.py
	pre:scripts/portalBuilder.py
	pre:scripts/generate_layouts.py
lib_extra_dirs = modules
build_flags =
	-I src
	-I modules/appContext
	-I modules/webServer
	-I modules/weatherClient
	-I modules/schedulerManager
	-I modules/wifiManager
	-I modules/configManager
	-I modules/displayManager
	-I modules/dataManager
	-I modules/otaUpdateManager
	-I${PROJECT_PACKAGES_DIR}/framework-arduinoespressif32/libraries/Network/src
	-I${PROJECT_PACKAGES_DIR}/framework-arduinoespressif32/libraries/FS/src
	-D CORE_DEBUG_LEVEL=3
	-D APP_DEBUG_LEVEL=4
	-D U8G2_WITHOUT_FONT_ROTATION
	-D U8G2_WITHOUT_UNICODE
	-D DISPLAY_CS_PIN=26
	-D DISPLAY_DC_PIN=5
	-D DISPLAY_SPI_SCK=18
	-D DISPLAY_SPI_MISO=19
	-D DISPLAY_SPI_MOSI=23
	-D BUTTON_PIN=34
	-D MAX_BOARDS=6
	-D MAX_KEYS=4
	-D BUILD_ENV=\"esp32dev\"
	-D OTA_REPO=\"${custom.github_ota_repo}\"

custom_component_remove = 
	espressif/esp_rainmaker
	espressif/rmaker_common
	espressif/esp_insights
	espressif/esp_diag_data_store
	espressif/esp_diagnostics
	espressif/esp-zigbee-lib
	espressif/esp-zboss-lib
	espressif/esp_modem
	espressif/cbor
	espressif/qrcode
	espressif/esp-dsp
	espressif/esp32-camera
	espressif/libsodium
	espressif/esp_wifi_remote
	espressif/lan867x
	espressif/json_generator
	espressif/json_parser
	espressif/jsmn
	espressif/esp_secure_cert_mgr
	espressif/esp_schedule
	espressif/esp_rcp_update
	espressif/lan86xx_common
	chmorgan/esp-libhelix-mp3

board_build.f_cpu = 240000000L
framework = arduino, espidf
monitor_speed = 115200
lib_ldf_mode = chain+
lib_deps =
	olikraus/U8g2@2.36.18
	bblanchon/ArduinoJson@7.4.3
	squix78/JsonStreamingParser@1.0.5
	ESP32Async/ESPAsyncWebServer
	HTTPClient
	NetworkClientSecure

[env:esp32s3nano]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = arduino_nano_esp32
board_build.partitions = partitions.esp32s3nano.csv
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults, sdkconfig.defaults.esp32s3nano
extra_scripts = 
	pre:scripts/build_timestamp.py
	pre:scripts/build_fonts.py
	pre:scripts/auto_build_wasm.py
	pre:scripts/run_web_tests.py
	pre:scripts/portalBuilder.py
	pre:scripts/generate_layouts.py
lib_extra_dirs = modules
build_flags =
	-I src
	-I modules/appContext
	-I modules/webServer
	-I modules/weatherClient
	-I modules/schedulerManager
	-I modules/wifiManager
	-I modules/configManager
	-I modules/displayManager
	-I modules/dataManager
	-I modules/otaUpdateManager
	-I${PROJECT_PACKAGES_DIR}/framework-arduinoespressif32/libraries/Network/src
	-I${PROJECT_PACKAGES_DIR}/framework-arduinoespressif32/libraries/FS/src
	-D CORE_DEBUG_LEVEL=3
	-D APP_DEBUG_LEVEL=4
	-D U8G2_WITHOUT_FONT_ROTATION
	-D U8G2_WITHOUT_UNICODE
	-D DISPLAY_CS_PIN=10
	-D DISPLAY_DC_PIN=9
	-D DISPLAY_SPI_SCK=48
	-D DISPLAY_SPI_MISO=47
	-D DISPLAY_SPI_MOSI=38
	-D BUTTON_PIN=8
	-D MAX_BOARDS=6
	-D MAX_KEYS=4
	; MANDATORY FOR NATIVE USB ESP32-S3
	; Initialize the USB CDC stack so logs don't go to physical pins
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_LED=0
	-D BOARD_LED_ON=LOW
	-D OTA_REPO=\"${custom.github_ota_repo}\"

custom_component_remove = 
	espressif/esp_rainmaker
	espressif/rmaker_common
	espressif/esp_insights
	espressif/esp_diag_data_store
	espressif/esp_diagnostics
	espressif/esp-zigbee-lib
	espressif/esp-zboss-lib
	espressif/esp_modem
	espressif/cbor
	espressif/qrcode
	espressif/esp-dsp
	espressif/esp32-camera
	espressif/libsodium
	espressif/esp_wifi_remote
	espressif/lan867x
	espressif/json_generator
	espressif/json_parser
	espressif/jsmn
	espressif/esp_secure_cert_mgr
	espressif/esp_schedule
	espressif/esp_rcp_update
	espressif/lan86xx_common
	chmorgan/esp-libhelix-mp3

; ; MANDATORY FOR macOS MONITORS
; ; Keep standard terminals from holding the reset (EN) pin low
; monitor_dtr = 0
; monitor_rts = 0

board_build.f_cpu = 240000000L
framework = arduino, espidf
monitor_speed = 115200
upload_protocol = esptool
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.flash_size = 16MB


lib_ldf_mode = chain+
lib_deps =
	olikraus/U8g2@2.36.18
	bblanchon/ArduinoJson@7.4.3
	squix78/JsonStreamingParser@1.0.5
	ESP32Async/ESPAsyncWebServer
	NetworkClientSecure

[env:unit_testing_host]
platform = native
build_flags = 
	-std=gnu++14
	-Wno-missing-template-arg-list-after-template-kw
	-D UNIT_TEST
	-D ARDUINOJSON_ENABLE_PROGMEM=0
	-D ARDUINOJSON_ENABLE_ARDUINO_STRING=1
	-D MAX_BOARDS=6
	-D MAX_KEYS=8
	-D DISPLAY_CS_PIN=26
	-D DISPLAY_DC_PIN=5
	-I src
	-I test/mocks
	-I lib/logger
	-I lib/deviceCrypto
	-I lib/buttonHandler
	-I modules/appContext
	-I modules/configManager
	-I modules/dataManager
	-I modules/schedulerManager
	-I modules/displayManager
	-I modules/webServer
	-I modules/displayManager/widgets
	-I modules/displayManager/boards
	-I modules/displayManager/boards/interfaces
	-I modules/weatherClient
	-I modules/schedulerManager
	-I modules/wifiManager
	-I modules/otaUpdateManager
	-I modules/timeManager
	-I modules/rssClient
	-I test/mocks/freertos
	-I .pio/libdeps/unit_testing_host/JsonStreamingParser
	-I .pio/libdeps/unit_testing_host/ArduinoJson/src
	-I .pio/libdeps/unit_testing_host/ArduinoFake/src/arduino
lib_compat_mode = strict
lib_ignore =
	wifiManager
	webServerManager
	deviceCrypto
lib_deps =
	bblanchon/ArduinoJson@7.4.3
	squix78/JsonStreamingParser@1.0.5
	fabiobatsilva/ArduinoFake@^0.4.0
build_src_filter = -<*>
