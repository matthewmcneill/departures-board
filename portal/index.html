<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Departures Board Config</title>
  <style>
    /* --- Design System & CSS Variables --- */
    :root {
      --primary: #f57c00;
      --primary-hover: #e65100;
      --bg: #ffffff;
      --card-bg: #f8f9fa;
      --text: #212529;
      --text-muted: #6c757d;
      --border: #dee2e6;
      --nav-bg: #ffffff;
      --success: #2e7d32;
      --error: #c62828;
      --warning: #f9a825;
      --font-size-base: 16px;
    }
    /* --- Dark Mode Theme Overrides --- */
    [data-theme="dark"] {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #e0e0e0;
      --text-muted: #adb5bd;
      --border: #333333;
      --nav-bg: #1e1e1e;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg); color: var(--text); line-height: 1.5; font-size: var(--font-size-base);
      padding-bottom: 80px; transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 1rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h2 { margin: 0; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; color: var(--primary); }
    .subtitle { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
    
    .ap-banner { 
      display: none; background: rgba(245, 124, 0, 0.1); border: 1px solid var(--primary); color: var(--primary); 
      padding: 0.8rem; border-radius: 12px; margin-bottom: 1.2rem; font-weight: 700; text-align: center; font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    body.ap-mode .ap-banner { display: block; }
    body.ap-mode .tab-link:not([data-target="tab-wifi"]) { display: none; }

    article { background: var(--card-bg); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    header { font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; display: block; }

    label { display: block; margin-bottom: 1rem; font-weight: 600; font-size: 0.9rem; }
    .input-row { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 1rem; }
    input[type="text"], input[type="password"], select, input[type="range"] { 
      width: 100%; padding: 0.75rem; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 1rem; margin-top: 0.4rem;
    }
    
    .password-input-wrapper { position: relative; width: 100%; margin-top: 0.4rem; }
    .eye-btn { 
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%); 
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; z-index: 5; display: flex; align-items: center; justify-content: center;
    }
    .eye-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.5; }

    button { 
      background: var(--primary); color: white; border: none; padding: 0.8rem 1.25rem; border-radius: 10px;
      font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem;
    }
    button:active { transform: scale(0.98); opacity: 0.9; }
    button.outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    button.secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .bottom-nav { 
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 70px; background: var(--nav-bg); 
      border-top: 1px solid var(--border); display: flex; justify-content: space-around; 
      align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-link { 
      flex: 1; display: flex; flex-direction: column; align-items: center; text-decoration: none; 
      color: var(--text-muted); font-size: 0.7rem; font-weight: 700; gap: 4px;
    }
    .tab-link .icon { font-size: 1.5rem; transition: 0.2s; }
    .tab-link.active { color: var(--primary); }
    .tab-link.active .icon { transform: translateY(-2px); }

    /* Drawer Styles */
    .drawer { border-top: 1px solid var(--border); margin-top: 1.5rem; }
    .drawer-trigger { 
      display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; 
      cursor: pointer; font-weight: 700; font-size: 0.9rem; color: var(--text-muted);
    }
    .drawer-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .drawer.active .drawer-content { max-height: 500px; padding-bottom: 1rem; }
    .drawer-trigger::after { content: '▼'; font-size: 0.7rem; transition: transform 0.3s; }
    .drawer.active .drawer-trigger::after { transform: rotate(180deg); }
    .drawer-trigger .status-badge { margin-left: auto; margin-right: 1rem; font-size: 0.7rem; opacity: 0.8; font-weight: 500; }

    .status-badge { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.green { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot.red { background: var(--error); box-shadow: 0 0 8px var(--error); }
    .dot.yellow { background: var(--warning); box-shadow: 0 0 8px var(--warning); }

    .diag-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 1rem; color: var(--text-muted); }
    .diag-table tr { border-bottom: 1px solid var(--border); }
    .diag-table tr:last-child { border-bottom: none; }
    .diag-table td { padding: 6px 0; }
    .diag-table td:first-child { font-weight: 700; color: var(--text); width: 40%; }
    .diag-table td:last-child { font-family: 'Courier New', monospace; text-align: right; }

    #wifi-test-log { 
      font-family: 'Courier New', monospace; font-size: 0.75rem; background: #000; color: #00ff00; 
      padding: 10px; border-radius: 8px; margin-top: 1rem; max-height: 120px; overflow-y: auto; display: none; border: 1px solid #333;
    }
    
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; }
    .list-item h4 { margin: 0; font-size: 1rem; }
    .list-item p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
    
    dialog { border: none; border-radius: 20px; padding: 0; background: var(--bg); color: var(--text); box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
    dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    
    .theme-toggle {
      display: flex; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 30px; padding: 4px; gap: 4px;
    }
    .theme-btn {
      background: transparent; border: none; color: var(--text-muted); padding: 0;
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.2s ease;
    }
    .theme-btn.active { background: var(--bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .theme-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }

    /* Loading Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>

  <script>
    // app: Core application logic for the configuration portal.
    // Handles state management, API communication, and dynamic UI rendering.
    const DUMMY_PASS = "●●●●●●●●";
    const app = {
      // --- Application State ---
      state: { 
        config: null,  // Persisted device configuration
        status: null   // Real-time system status
      },

      // Toggles visibility of eye buttons based on field content.
      refreshEyes: function() {
        document.querySelectorAll('input[type="password"]').forEach(input => {
          const eye = input.closest('.password-input-wrapper')?.querySelector('.eye-btn');
          if (eye) eye.style.display = (input.value === DUMMY_PASS || !input.value) ? 'none' : 'flex';
        });
      },

      // Initializes the application on page load.
      init: function() {
        this.initTheme();
        this.fetchStatus();
        this.fetchConfig();
        setInterval(() => this.fetchStatus(), 5000); // Polling for diagnostics
        this.bindEvents();
        setTimeout(() => this.scanWiFi(), 500);
      },

      // Configures and manages the UI color theme.
      initTheme: function() {
        let theme = localStorage.getItem('theme') || 'auto';
        const apply = (t) => {
          document.documentElement.setAttribute('data-theme', t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t);
          document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
        };
        apply(theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.onclick = () => {
            theme = btn.dataset.theme;
            localStorage.setItem('theme', theme);
            apply(theme);
          };
        });
      },

      // Fetches the current device configuration from the API.
      fetchConfig: async function() {
        try {
          const res = await fetch('/api/config');
          if (!res.ok) throw new Error();
          this.state.config = await res.json();
          this.render();
          this.refreshEyes();
        } catch (e) { console.log('Config fetch restricted'); }
      },

      // Fetches system health and network status from the API.
      fetchStatus: async function() {
        try {
          const res = await fetch('/api/status');
          this.state.status = await res.json();
          this.updateStatusUI();
        } catch (e) { console.error('Status fetch failed'); }
      },

      // Updates the diagnostics UI based on fetchStatus results.
      updateStatusUI: function() {
        // --- Step 1: Handle AP Mode Detection ---
        // If the board is in Captive Portal mode, we force the WiFi tab and alert the user.
        const s = this.state.status;
        if (!s) return;
        if (s.ap_mode) {
          document.body.classList.add('ap-mode');
          if (!this.prev_ap_mode) { this.switchTab('tab-wifi'); document.getElementById('diag-drawer').classList.add('active'); }
        } else {
          document.body.classList.remove('ap-mode');
        }
        this.prev_ap_mode = s.ap_mode;

        // --- Step 2: Update Connection Badge ---
        const dot = document.getElementById('wifi-dot');
        dot.className = 'dot ' + (s.ap_mode ? 'yellow' : (s.rssi > -80 ? 'green' : 'red'));
        document.getElementById('wifi-status-text').innerText = s.ap_mode ? 'Access Point Mode' : `Connected: ${s.ssid}`;
        
        // --- Step 3: Populate Diagnostics Table ---
        const rows = [
          ['Local IP', s.ip],
          ['Gateway', s.gateway],
          ['Subnet Mask', s.subnet],
          ['DNS 1', s.dns1],
          ['DNS 2', s.dns2],
          ['RSSI', `${s.rssi} dBm`],
          ['MAC Address', s.mac],
          ['BSSID', s.bssid],
          ['WiFi Channel', s.channel],
          ['System Heap', `${Math.round(s.heap/1024)} KB`],
          ['Storage', `${Math.round(s.storage_used/1024)} / ${Math.round(s.storage_total/1024)} KB`],
          ['Uptime', `${Math.round(s.uptime/60)} min`]
        ];
        
        document.getElementById('wifi-diag-table').innerHTML = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
      },

      // Triggers a WiFi scan and updates the selector.
      scanWiFi: async function() {
        const btn = document.getElementById('scan-btn');
        const oldText = btn.innerText;
        btn.innerHTML = '<div class="loading-spinner"></div>';
        btn.disabled = true;
        try {
          const res = await fetch('/api/wifi/scan');
          const networks = await res.json();
          const select = document.getElementById('wifi-ssid-select');
          let html = '<option value="">Select a network...</option>';
          html += networks.map(n => `<option value="${n.ssid}">${n.ssid} (${n.rssi}dBm)${n.secure?' 🔒':''}</option>`).join('');
          html += '<option value="__manual__">➕ Enter SSID Manually...</option>';
          select.innerHTML = html;
          // Re-populate SSID if we have it in state
          if (this.state.config?.wifi?.ssid) select.value = this.state.config.wifi.ssid;
        } catch(e) { 
           document.getElementById('wifi-ssid-select').innerHTML = '<option value="">Scan failed.</option><option value="__manual__">➕ Enter SSID Manually...</option>';
        } finally { btn.innerText = oldText; btn.disabled = false; }
      },

      // Handles manual SSID entry toggle.
      handleSSIDChange: function(val) {
        document.getElementById('manual-ssid-group').style.display = (val === '__manual__') ? 'block' : 'none';
      },

      // Toggles password field visibility.
      togglePass: function(id, btn) {
        const input = document.getElementById(id);
        if (input.value === DUMMY_PASS) return; // No point toggling dummy stars
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        
        if (btn) {
          const eyeSvg = `<svg><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
          const eyeOffSvg = `<svg><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
          btn.innerHTML = isPass ? eyeOffSvg : eyeSvg;
        }
      },

      // Toggles diagnostics drawer.
      toggleDiag: function() {
        document.getElementById('diag-drawer').classList.toggle('active');
      },

      // Tests WiFi connection.
      testWiFi: async function() {
        const log = document.getElementById('wifi-test-log');
        const btn = document.getElementById('test-btn');
        log.style.display = 'block';
        log.innerHTML = '<b>> Attempting connection test...</b><br>';
        btn.disabled = true;
        const selectVal = document.getElementById('wifi-ssid-select').value;
        const ssid = (selectVal === '__manual__') ? document.getElementById('manual-ssid-input').value : selectVal;
        
        if (!ssid) {
          log.innerHTML += '<span style="color:#ff4444">> Error: No SSID selected</span>';
          btn.disabled = false; return;
        }

        const host = window.location.hostname;
        const isAp = (host === "192.168.4.1" || host.toLowerCase().endsWith(".local"));

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);
          
          const res = await fetch('/api/wifi/test', { 
            method: 'POST', 
            body: JSON.stringify({ ssid, pass: document.getElementById('wifi-pass').value }),
            signal: controller.signal
          });
          clearTimeout(timeoutId);
          
          const result = await res.json();
          log.innerHTML += result.status === 'ok' ? `<span style="color:#00ff00">> SUCCESS! IP: ${result.ip}</span>` : `<span style="color:#ff4444">> FAILED: ${result.error}</span>`;
        } catch (e) { 
          // --- Functional Flow: Connection Lost Handling ---
          // When testing a new network, the board might reconnect and disconnect existing clients. 
          // We provide a helpful transition message.
          console.log("Test connection lost (expected if network switched)");
          log.innerHTML += `
            <div style="margin-top:0.5rem; padding:0.5rem; border:1px solid #f9a825; border-radius:8px; background: rgba(249,168,37,0.1);">
              <span style="color:#f9a825; font-weight:700;">📡 Connection Transitioning...</span><br>
              <div style="font-size:0.8rem; margin-top:0.3rem;">
                The board may have joined the new network. <br>
                1. Check the <b>board's screen</b> for a new IP.<br>
                2. reconnect your 📱/💻 to the same network.<br>
                3. Click below to try reconnecting:<br>
                <a href="http://${document.querySelector('[name=hostname]').value}.local/portal" style="color:var(--primary); font-weight:700; display:block; margin-top:0.4rem;">👉 Open ${document.querySelector('[name=hostname]').value}.local</a>
              </div>
            </div>`;
        }
        btn.disabled = false;
      },

      // Erases WiFi credentials and reboots the board.
      resetWiFi: async function() {
        const msg = "WARNING: This will erase all stored WiFi credentials and reboot the board into 'Setup Mode' (Access Point).\n\n" +
                    "To reconfigure, you will need to:\n" +
                    "1. Connect your phone/laptop to the 'departures' (or '" + (this.state.config?.system?.hostname || 'departures') + "') WiFi network.\n" +
                    "2. Visit http://192.168.4.1\n\n" +
                    "Are you sure you want to proceed?";
        
        if (!confirm(msg)) return;

        const btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerText = "Resetting...";

        try {
          const res = await fetch('/api/wifi/reset', { method: 'POST' });
          if (res.ok) {
            alert("WiFi Erased. The board is rebooting...\n\nPlease switch to the 'departures' WiFi network in a few moments.");
            window.location.reload();
          } else {
            throw new Error();
          }
        } catch (e) {
          alert("Reset failed. Check connection.");
          btn.disabled = false;
          btn.innerText = "Reset WiFi";
        }
      },

      // Renders application UI.
      render: function() {
        const cfg = this.state.config;
        if (!cfg) return;
        document.querySelector('[name="hostname"]').value = cfg.system.hostname;
        document.querySelector('[name="timezone"]').value = cfg.system.timezone;
        document.querySelector('[name="brightness"]').value = cfg.system.brightness;
        document.querySelector('[name="flip"]').checked = cfg.system.flip;
        if (cfg.wifi) {
          document.getElementById('wifi-ssid-select').value = cfg.wifi.ssid || "";
          document.getElementById('wifi-pass').value = cfg.wifi.ssid ? DUMMY_PASS : "";
        }
        this.renderBoards();
        this.renderKeys();
      },

      // Renders active boards list.
      renderBoards: function() {
        const list = document.getElementById('boards-list');
        const boards = this.state.config?.boards || [];
        if (boards.length === 0) { list.innerHTML = '<article style="text-align:center; padding: 2rem; opacity:0.6;">No boards configured.</article>'; return; }
        list.innerHTML = boards.map((b, i) => `<div class="list-item"><div><h4>${b.name}</h4><p>${['Rail','Tube','Bus'][b.type]} • ${b.id}</p></div><div style="display:flex; gap:8px;"><button class="secondary" style="padding:0.4rem 0.6rem; font-size:0.75rem;" onclick="app.editBoard(${i})">Edit</button><button class="secondary" style="padding:0.4rem 0.6rem; font-size:0.75rem; color: #ff4444;" onclick="app.deleteBoard(${i})">X</button></div></div>`).join('');
      },

      // Renders API keys section.
      renderKeys: function() {
        const list = document.getElementById('keys-list');
        const k = this.state.config?.keys || {nrToken:'', tflAppkey:'', owmToken:''};
        
        const createField = (id, label, val) => {
          const isDummy = val && val.length > 0;
          return `
            <label>${label}
              <div class="password-input-wrapper">
                <input type="password" id="${id}" value="${isDummy ? DUMMY_PASS : ''}" style="margin-top:0;" />
                <button type="button" class="eye-btn" style="display:none" onclick="app.togglePass('${id}', this)">
                  <svg><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </label>`;
        };

        list.innerHTML = 
          createField('key-nr', 'National Rail Token', k.nrToken) +
          createField('key-tfl', 'TfL App Key', k.tflAppkey) +
          createField('key-owm', 'OpenWeatherMap Token', k.owmToken);
      },

      // Opens board editor modal.
      editBoard: function(index) {
        const form = document.getElementById('board-form');
        const b = index === -1 ? {name:'', type:0, id:'', weather:true} : this.state.config.boards[index];
        form.index.value = index; form.name.value = b.name; form.type.value = b.type; form.id.value = b.id; form.weather.checked = b.weather;
        document.getElementById('modal-board').showModal();
      },

      // Deletes a board locally.
      deleteBoard: function(index) {
        if (confirm('Remove this board?')) { this.state.config.boards.splice(index, 1); this.renderBoards(); }
      },

      // Aggregates and saves configuration.
      saveAll: async function() {
        const btn = document.getElementById('save-btn');
        const oldText = btn.innerText;
        btn.innerHTML = '<div class="loading-spinner"></div> Saving...';
        btn.disabled = true;
        
        // --- Step 1: Collect Payload ---
        const form = document.querySelector('#wifi-form');
        const selectVal = document.getElementById('wifi-ssid-select').value;
        const ssid = (selectVal === '__manual__') ? document.getElementById('manual-ssid-input').value : selectVal;
        
        const getVal = (id) => {
          const val = document.getElementById(id)?.value;
          return (val === DUMMY_PASS) ? undefined : val; // undefined will be filtered out by JSON.stringify
        };

        const payload = {
          system: {
            hostname: form.hostname.value,
            timezone: document.querySelector('[name="timezone"]')?.value || "GMT0BST,M3.5.0/2,M10.5.0/3",
            brightness: parseInt(document.querySelector('[name="brightness"]')?.value || 128),
            flip: document.querySelector('[name="flip"]')?.checked || false
          },
          keys: {
            nrToken: getVal('key-nr'),
            tflAppkey: getVal('key-tfl'),
            owmToken: getVal('key-owm')
          },
          boards: this.state.config?.boards || [],
          wifi: { ssid, pass: getVal('wifi-pass') }
        };

        // --- Step 2: Dispatch Save ---
        try {
          const res = await fetch('/api/saveall', { method: 'POST', body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
          if (this.state.status.ap_mode) { alert("Success! System is rebooting to connect to " + ssid); }
          else { alert("Settings updated successfully!"); }
        } catch (e) { alert("Save failed. Check connection."); }
        finally { btn.innerText = oldText; btn.disabled = false; }
      },

      // Navigates between tabs.
      switchTab: function(targetId) {
        document.querySelectorAll('.tab-link, .tab-content').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-target="${targetId}"]`)?.classList.add('active');
        document.getElementById(targetId).classList.add('active');
      },

      // Closes a modal dialog.
      closeModal: id => document.getElementById(id).close(),

      // Binds UI events.
      bindEvents: function() {
        // Delegated listener for password field changes (handles dynamic fields)
        document.addEventListener('input', (e) => {
          if (e.target.type === 'password') {
            const eye = e.target.closest('.password-input-wrapper')?.querySelector('.eye-btn');
            if (eye) eye.style.display = (e.target.value === DUMMY_PASS || !e.target.value) ? 'none' : 'flex';
          }
        });
        document.querySelectorAll('.tab-link').forEach(link => { link.onclick = (e) => { e.preventDefault(); this.switchTab(link.dataset.target); }; });
        document.getElementById('board-form').onsubmit = (e) => {
          e.preventDefault();
          const f = e.target;
          const b = { name: f.name.value, type: parseInt(f.type.value), id: f.id.value, weather: f.weather.checked };
          if (!this.state.config) this.state.config = { boards: [] };
          if (f.index.value == -1) this.state.config.boards.push(b); else this.state.config.boards[f.index.value] = b;
          this.closeModal('modal-board');
          this.renderBoards();
        };
      }
    };
    app.init();
  </script>
</body>
</html>
