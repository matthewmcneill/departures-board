# Team presets for Embedded Web Design
presets:
  embedded_ui_team:
    agents:
      - name: Frontend_Designer
        role: parallel
        instructions: "Responsible solely for Phase 2. Generates semantic HTML, vanilla JS, and minimalist CSS. Must strictly adhere to memory constraints."
      - name: Code_Compressor
        role: serial
        instructions: "Responsible solely for Phase 3. Takes the output of the Frontend_Designer, saves to disk, and executes the python compression script."
      - name: Firmware_Integrator
        role: parallel
        instructions: "Responsible solely for Phase 4. Analyzes the C++ codebase and writes the server routing logic to serve the PROGMEM arrays."
orchestrator:
  max_parallel: 2
  backend: auto
